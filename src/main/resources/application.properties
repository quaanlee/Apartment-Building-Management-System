spring.application.name=Apartment_Building_Management_System
server.port=8080

# 1. C?u h́nh K?t n?i Database
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ABMS;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. C?u h́nh JPA / Hibernate ? ch? ?? nghiêm ng?t ban ??u c?a b?n
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- 3 D̉NG QUAN TR?NG NH?T ?? GI?I QUY?T L?I ---
# Ép Hibernate gi? nguyên ch? Hoa/Th??ng nh? b?n c?u h́nh trong @Table và @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Ch? ??nh rơ schema và dialect ?? SQL Server không quét l?ch phân vùng d? li?u
spring.jpa.properties.hibernate.default_schema=dbo
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 4. C?u h́nh Thymeleaf
spring.thymeleaf.cache=false 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html