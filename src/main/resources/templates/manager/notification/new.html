<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/manager/layout_manager :: manager-layout(~{::#main-content}, 'notifications')}"
      th:with="pageTitle='Thông báo Mới'">
<head>
    <title>Thông báo Mới</title>
</head>
<body>
<div id="main-content">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        #main-content {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            padding: 24px;
            min-height: calc(100vh - 100px);
        }
        
        .back-link {
            color: #582BE8;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #4a22c9;
            text-decoration: none;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 24px;
        }
 
        .form-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            max-width: 800px;
        }
 
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
 
        .form-control, .form-select {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: #111827;
            font-family: 'Inter', sans-serif;
        }
 
        .form-control:focus, .form-select:focus {
            border-color: #582BE8;
            box-shadow: 0 0 0 3px rgba(88, 43, 232, 0.15);
        }
 
        .btn-save {
            background-color: #582BE8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
 
        .btn-save:hover {
            background-color: #4a22c9;
            box-shadow: 0 4px 12px rgba(88, 43, 232, 0.15);
        }
 
        .btn-cancel {
            background-color: white;
            border: 1px solid #d1d5db;
            color: #374151;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
 
        .btn-cancel:hover {
            background-color: #f9fafb;
            color: #111827;
        }
    </style>

    <a th:href="@{/manager/notifications}" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Quay lại Danh sách
    </a>

    <h1 class="page-title">Tạo Thông báo Mới</h1>

    <div class="form-card">
        <form th:action="@{/manager/notifications/new}" method="post">
            <div class="mb-4">
                <label for="title" class="form-label">Tiêu đề</label>
                <input type="text" class="form-control" id="title" name="title" placeholder="Nhập tiêu đề thông báo" required>
            </div>

            <div class="mb-4">
                <label for="content" class="form-label">Nội dung Thông báo</label>
                <textarea class="form-control" id="content" name="content" rows="6" placeholder="Nhập nội dung thông báo tại đây..." required></textarea>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label for="notificationType" class="form-label">Loại Thông báo</label>
                    <select class="form-select" id="notificationType" name="notificationType" required>
                        <option value="1">Bản tin chung</option>
                        <option value="2">Cảnh báo</option>
                        <option value="3">Thanh toán</option>
                        <option value="4">Khác</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="relatedEntityType" class="form-label">Nhóm Người nhận</label>
                    <select class="form-select" id="relatedEntityType" name="relatedEntityType" required>
                        <option value="All Residents">Tất cả Cư dân</option>
                        <option value="Building A">Tòa nhà A</option>
                        <option value="Vehicle Owners">Chủ xe</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn-save">Tạo và Gửi</button>
                <a th:href="@{/manager/notifications}" class="btn-cancel">Hủy</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
