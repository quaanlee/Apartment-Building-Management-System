<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin/layout :: admin-layout(~{::main}, 'building')}">
<head>
    <title>Assign Resident</title>
</head>
<body>

<main>
    <!-- Link custom stylesheet -->
    <link rel="stylesheet" th:href="@{/css/building-management.css}">

    <!-- Page Header Actions -->
    <div class="detail-header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div class="detail-title" style="font-size: 24px; font-weight: 700; color: var(--text-primary);">
            Assign Resident to <span th:text="${apartment.apartmentNumber}">A-405</span>
        </div>
        <a th:href="@{/admin/apartments/detail/{id}(id=${apartment.apartmentId})}" class="cancel-btn" style="display: inline-flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Back to Detail
        </a>
    </div>

    <div class="form-wrapper" style="padding: 0; min-height: auto; background: none; display: flex; justify-content: center; align-items: flex-start;">
        <div class="form-card" style="width: 100%; max-width: 600px; box-sizing: border-box;">
            <h2 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Resident Assignment</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Select the resident and the move-in date.</p>

            <form th:action="@{/admin/apartments/assign}" method="post">

                <input type="hidden" name="apartmentId" th:value="${apartment.apartmentId}">

                <label>Apartment Number</label>
                <input type="text" th:value="${apartment.apartmentNumber}" readonly style="background-color: #F3F4F6; cursor: not-allowed;">

                <label>Resident</label>
                <select name="profileId" required>
                    <option value="">Select resident</option>
                    <option th:each="resident : ${residents}"
                            th:value="${resident.profileId}"
                            th:text="${resident.fullName + ' - ' + resident.phoneNumber}">
                    </option>
                </select>

                <label>Move In Date</label>
                <input type="date" name="moveInDate" required>

                <div class="form-actions" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                    <a th:href="@{/admin/apartments/detail/{id}(id=${apartment.apartmentId})}" class="cancel-btn" style="border: 1px solid var(--border-color); text-align: center;">
                        Cancel
                    </a>

                    <button type="submit" class="save-btn">
                        Assign Resident
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

</body>
</html>
