<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/admin/layout :: admin-layout(~{::main}, 'users')}">
<head>
    <meta charset="UTF-8">
    <title th:text="${userDto.profileId == null ? 'Create User' : 'Edit User'}">Create User</title>
</head>

<main th:fragment="content">
    <!-- Load custom form CSS -->

    <!-- Page Header Actions -->

            Create User Account

        <a th:href="@{/admin/users}" class="btn-secondary">
            <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i>Back to List

    </div>

                        </div>
                        
                        <div class="form-group">
                            <label for="res-citizen">Citizen ID (CCCD)<span class="required-star">*</span></label>
                            <input type="text" id="res-citizen" th:field="*{citizenId}" class="form-control" th:classappend="${#fields.hasErrors('citizenId')} ? 'is-invalid'" placeholder="12-digit number">
                            <span class="error-text" th:if="${#fields.hasErrors('citizenId')}" th:errors="*{citizenId}"></span>
                        </div>
                        <div class="form-group">
                            <label for="res-citizen-date">Issue Date</label>
                            <input type="date" id="res-citizen-date" th:field="*{citizenIdIssueDate}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="res-citizen-place">Issue Place</label>
                            <input type="text" id="res-citizen-place" th:field="*{citizenIdIssuePlace}" class="form-control" placeholder="e.g. Cục QLHC về TTXH">
                        </div>
                        <div class="form-group">
                            <label for="res-nationality">Nationality</label>
                            <input type="text" id="res-nationality" th:field="*{nationality}" class="form-control">

                        <div class="form-group">

    <!-- Client-side Tab Switcher Script -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.tab-btn');
            const panels = document.querySelectorAll('.tab-panel');

            function switchTab(tabId) {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));

                const activeTabBtn = Array.from(tabs).find(t => t.getAttribute('data-tab') === tabId);
                if (activeTabBtn) {
                    activeTabBtn.classList.add('active');
                }
                const activePanel = document.getElementById(tabId);
                if (activePanel) {
                    activePanel.classList.add('active');
                }
            }

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetPanel = tab.getAttribute('data-tab');
                    switchTab(targetPanel);
                });
            });

            // Keep tab active based on roleName from model if present
            const submittedRole = /*[[${userDto.roleName}]]*/ '';
            if (submittedRole === 'MANAGER') {
                switchTab('manager-tab');
            } else if (submittedRole === 'MAINTENANCE_STAFF') {
                switchTab('staff-tab');
            } else {
                switchTab('resident-tab');
            }
        });
    </script>
