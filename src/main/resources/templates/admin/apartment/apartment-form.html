<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin/layout_admin :: admin-layout(~{::main}, 'building')}">
<head>
    <title th:text="${pageTitle == 'Add New Unit' ? 'Thêm Căn hộ mới' : (pageTitle == 'Edit Unit' ? 'Chỉnh sửa Căn hộ' : pageTitle)}">Apartment Form</title>
</head>
<body>

<main>
    <!-- Link custom stylesheet -->
    <link rel="stylesheet" th:href="@{/css/manager/apartment/building-management.css}">

    <!-- Page Header Actions -->
    <div class="detail-header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div class="detail-title" style="font-size: 24px; font-weight: 700; color: var(--text-primary);"
             th:text="${pageTitle == 'Add New Unit' ? 'Thêm Căn hộ mới' : (pageTitle == 'Edit Unit' ? 'Chỉnh sửa Căn hộ' : pageTitle)}">
            Thêm Căn hộ mới
        </div>
        <a th:href="@{/admin/apartments}" class="cancel-btn" style="display: inline-flex; align-items: center; gap: 8px;">
            <i class="fa-solid fa-arrow-left"></i> Quay lại danh sách
        </a>
    </div>

    <div class="form-wrapper" style="padding: 0; min-height: auto; background: none; display: flex; justify-content: center; align-items: flex-start;">
        <div class="form-card" style="width: 100%; max-width: 600px; box-sizing: border-box;">
            <h2 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;">Chi tiết căn hộ</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Nhập thông tin căn hộ bên dưới.</p>

            <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

            <form th:action="@{${actionUrl}}" th:object="${apartment}" method="post" enctype="multipart/form-data" novalidate>

                <label>Số căn hộ</label>
                <input type="text" th:field="*{apartmentNumber}" required placeholder="Ví dụ: A-101"
                       th:classappend="${#fields.hasErrors('apartmentNumber')} ? 'is-invalid'">
                <span id="apartmentNumber-error" class="error-text"
                      th:text="${#fields.hasErrors('apartmentNumber')} ? ${#fields.firstError('apartmentNumber')} : ''"
                      th:style="${#fields.hasErrors('apartmentNumber')} ? 'display: block;' : 'display: none;'"></span>

                <label>Tầng</label>
                <input type="number" th:field="*{floor}" required min="1" max="100" placeholder="Ví dụ: 1"
                       th:classappend="${#fields.hasErrors('floor')} ? 'is-invalid'">
                <span id="floor-error" class="error-text"
                      th:text="${#fields.hasErrors('floor')} ? ${#fields.firstError('floor')} : ''"
                      th:style="${#fields.hasErrors('floor')} ? 'display: block;' : 'display: none;'"></span>

                <label>Diện tích (m²)</label>
                <input type="number" step="0.01" th:field="*{area}" required min="10" max="1000" placeholder="Ví dụ: 75.5"
                       th:classappend="${#fields.hasErrors('area')} ? 'is-invalid'">
                <span id="area-error" class="error-text"
                      th:text="${#fields.hasErrors('area')} ? ${#fields.firstError('area')} : ''"
                      th:style="${#fields.hasErrors('area')} ? 'display: block;' : 'display: none;'"></span>

                <label>Loại phòng</label>
                <select th:field="*{roomType}" required
                        th:classappend="${#fields.hasErrors('roomType')} ? 'is-invalid'">
                    <option value="">Chọn loại phòng</option>
                    <option value="Studio">Studio</option>
                    <option value="1 Bedroom">1 Phòng ngủ</option>
                    <option value="2 Bedrooms">2 Phòng ngủ</option>
                    <option value="3 Bedrooms">3 Phòng ngủ</option>
                    <option value="Penthouse">Penthouse</option>
                </select>
                <span id="roomType-error" class="error-text"
                      th:text="${#fields.hasErrors('roomType')} ? ${#fields.firstError('roomType')} : ''"
                      th:style="${#fields.hasErrors('roomType')} ? 'display: block;' : 'display: none;'"></span>

                <label>Trạng thái</label>
                <select th:field="*{status}" required
                        th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
                    <option value="0">Còn trống</option>
                    <option value="1">Đang ở</option>
                    <option value="2">Đang bảo trì</option>
                </select>
                <span id="status-error" class="error-text"
                      th:text="${#fields.hasErrors('status')} ? ${#fields.firstError('status')} : ''"
                      th:style="${#fields.hasErrors('status')} ? 'display: block;' : 'display: none;'"></span>

                <label>Số người tối đa</label>
                <input type="number" th:field="*{maxOccupancy}" required min="1" max="20" placeholder="Ví dụ: 4"
                       th:classappend="${#fields.hasErrors('maxOccupancy')} ? 'is-invalid'">
                <span id="maxOccupancy-error" class="error-text"
                      th:text="${#fields.hasErrors('maxOccupancy')} ? ${#fields.firstError('maxOccupancy')} : ''"
                      th:style="${#fields.hasErrors('maxOccupancy')} ? 'display: block;' : 'display: none;'"></span>
                <label style="margin-top: 20px;">Hình ảnh căn hộ</label>
                <input type="hidden" name="deleteMainImage" id="deleteMainImage" value="false">
                <input type="hidden" name="deleteSubImage1" id="deleteSubImage1" value="false">
                <input type="hidden" name="deleteSubImage2" id="deleteSubImage2" value="false">
                <div class="image-upload-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                    <!-- Main Image -->
                    <div class="upload-box" style="border: 1px dashed var(--border-color); border-radius: var(--radius-md); padding: 12px; text-align: center;">
                        <span style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px;">Ảnh chính (Đại diện)</span>
                        <div class="preview-container" style="position: relative; width: 100%; height: 100px; background: #f3f4f6; border-radius: 8px; overflow: hidden; margin-bottom: 8px; display: flex; align-items: center; justify-content: center;">
                            <img id="main-preview" 
                                 th:src="${apartment.apartmentImages != null && !apartment.apartmentImages.isEmpty() ? apartment.apartmentImages.get(0).imageUrl : ''}"
                                 th:style="${apartment.apartmentImages != null && !apartment.apartmentImages.isEmpty() ? 'width:100%;height:100%;object-fit:cover;' : 'display:none;'}" />
                            <i id="main-placeholder" class="fa-regular fa-image" style="font-size: 24px; color: #9ca3af;" 
                               th:style="${apartment.apartmentImages != null && !apartment.apartmentImages.isEmpty() ? 'display:none;' : 'font-size: 24px; color: #9ca3af;'}"></i>
                            <button type="button" id="main-delete-btn" 
                                    style="position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;"
                                    th:style="${apartment.apartmentImages != null && !apartment.apartmentImages.isEmpty() ? 'position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;' : 'display: none;'}"
                                    onclick="clearImage('mainImage', 'main-preview', 'main-placeholder', 'main-delete-btn', 'deleteMainImage')">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <input type="file" name="mainImage" id="mainImage" accept="image/*" style="display: none;" onchange="previewImage(this, 'main-preview', 'main-placeholder', 'main-delete-btn', 'deleteMainImage')">
                        <button type="button" class="cancel-btn" style="padding: 6px 12px; font-size: 12px; width: 100%; text-align: center;" onclick="document.getElementById('mainImage').click();">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Chọn tệp
                        </button>
                    </div>

                    <!-- Sub Image 1 -->
                    <div class="upload-box" style="border: 1px dashed var(--border-color); border-radius: var(--radius-md); padding: 12px; text-align: center;">
                        <span style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px;">Ảnh phụ 1</span>
                        <div class="preview-container" style="position: relative; width: 100%; height: 100px; background: #f3f4f6; border-radius: 8px; overflow: hidden; margin-bottom: 8px; display: flex; align-items: center; justify-content: center;">
                            <img id="sub1-preview" 
                                 th:src="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 1 ? apartment.apartmentImages.get(1).imageUrl : ''}"
                                 th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 1 ? 'width:100%;height:100%;object-fit:cover;' : 'display:none;'}" />
                            <i id="sub1-placeholder" class="fa-regular fa-image" style="font-size: 24px; color: #9ca3af;" 
                               th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 1 ? 'display:none;' : 'font-size: 24px; color: #9ca3af;'}"></i>
                            <button type="button" id="sub1-delete-btn" 
                                    style="position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;"
                                    th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 1 ? 'position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;' : 'display: none;'}"
                                    onclick="clearImage('subImage1', 'sub1-preview', 'sub1-placeholder', 'sub1-delete-btn', 'deleteSubImage1')">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <input type="file" name="subImage1" id="subImage1" accept="image/*" style="display: none;" onchange="previewImage(this, 'sub1-preview', 'sub1-placeholder', 'sub1-delete-btn', 'deleteSubImage1')">
                        <button type="button" class="cancel-btn" style="padding: 6px 12px; font-size: 12px; width: 100%; text-align: center;" onclick="document.getElementById('subImage1').click();">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Chọn tệp
                        </button>
                    </div>

                    <!-- Sub Image 2 -->
                    <div class="upload-box" style="border: 1px dashed var(--border-color); border-radius: var(--radius-md); padding: 12px; text-align: center;">
                        <span style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px;">Ảnh phụ 2</span>
                        <div class="preview-container" style="position: relative; width: 100%; height: 100px; background: #f3f4f6; border-radius: 8px; overflow: hidden; margin-bottom: 8px; display: flex; align-items: center; justify-content: center;">
                            <img id="sub2-preview" 
                                 th:src="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 2 ? apartment.apartmentImages.get(2).imageUrl : ''}"
                                 th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 2 ? 'width:100%;height:100%;object-fit:cover;' : 'display:none;'}" />
                            <i id="sub2-placeholder" class="fa-regular fa-image" style="font-size: 24px; color: #9ca3af;" 
                               th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 2 ? 'display:none;' : 'font-size: 24px; color: #9ca3af;'}"></i>
                            <button type="button" id="sub2-delete-btn" 
                                    style="position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;"
                                    th:style="${apartment.apartmentImages != null && apartment.apartmentImages.size() > 2 ? 'position: absolute; top: 8px; right: 8px; background: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 10;' : 'display: none;'}"
                                    onclick="clearImage('subImage2', 'sub2-preview', 'sub2-placeholder', 'sub2-delete-btn', 'deleteSubImage2')">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <input type="file" name="subImage2" id="subImage2" accept="image/*" style="display: none;" onchange="previewImage(this, 'sub2-preview', 'sub2-placeholder', 'sub2-delete-btn', 'deleteSubImage2')">
                        <button type="button" class="cancel-btn" style="padding: 6px 12px; font-size: 12px; width: 100%; text-align: center;" onclick="document.getElementById('subImage2').click();">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Chọn tệp
                        </button>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                    <a th:href="@{/admin/apartments}" class="cancel-btn" style="border: 1px solid var(--border-color); text-align: center;">Hủy bỏ</a>
                    <button type="submit" class="save-btn">Lưu</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Client-side Validation Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const form = document.querySelector("form");
            const apartmentNumber = document.getElementById("apartmentNumber");
            const floor = document.getElementById("floor");
            const area = document.getElementById("area");
            const roomType = document.getElementById("roomType");
            const status = document.getElementById("status");
            const maxOccupancy = document.getElementById("maxOccupancy");

            const errors = {
                apartmentNumber: document.getElementById("apartmentNumber-error"),
                floor: document.getElementById("floor-error"),
                area: document.getElementById("area-error"),
                roomType: document.getElementById("roomType-error"),
                status: document.getElementById("status-error"),
                maxOccupancy: document.getElementById("maxOccupancy-error")
            };

            function showError(input, errorEl, message) {
                input.classList.add("is-invalid");
                errorEl.textContent = message;
                errorEl.style.display = "block";
            }

            function clearError(input, errorEl) {
                input.classList.remove("is-invalid");
                errorEl.textContent = "";
                errorEl.style.display = "none";
            }

            function validateApartmentNumber() {
                const val = apartmentNumber.value.trim();
                if (!val) {
                    showError(apartmentNumber, errors.apartmentNumber, "Số căn hộ là bắt buộc");
                    return false;
                }
                if (val.length < 2 || val.length > 20) {
                    showError(apartmentNumber, errors.apartmentNumber, "Số căn hộ phải từ 2 đến 20 ký tự");
                    return false;
                }
                if (!/^[a-zA-Z0-9\-]+$/.test(val)) {
                    showError(apartmentNumber, errors.apartmentNumber, "Số căn hộ chỉ được chứa chữ cái, số và dấu gạch ngang (ví dụ: A-101, 109)");
                    return false;
                }
                clearError(apartmentNumber, errors.apartmentNumber);
                return true;
            }

            function validateFloor() {
                const val = floor.value.trim();
                if (!val) {
                    showError(floor, errors.floor, "Số tầng là bắt buộc");
                    return false;
                }
                const num = parseInt(val);
                if (isNaN(num) || num < 1 || num > 100) {
                    showError(floor, errors.floor, "Tầng phải là số nguyên trong khoảng từ 1 đến 100");
                    return false;
                }
                clearError(floor, errors.floor);
                return true;
            }

            function validateArea() {
                const val = area.value.trim();
                if (!val) {
                    showError(area, errors.area, "Diện tích là bắt buộc");
                    return false;
                }
                const num = parseFloat(val);
                if (isNaN(num) || num < 10.0 || num > 1000.0) {
                    showError(area, errors.area, "Diện tích phải là số từ 10.00 đến 1000.00 m²");
                    return false;
                }
                clearError(area, errors.area);
                return true;
            }

            function validateRoomType() {
                const val = roomType.value;
                if (!val) {
                    showError(roomType, errors.roomType, "Vui lòng chọn loại phòng");
                    return false;
                }
                clearError(roomType, errors.roomType);
                return true;
            }

            function validateStatus() {
                const val = status.value;
                if (val === "") {
                    showError(status, errors.status, "Vui lòng chọn trạng thái");
                    return false;
                }
                clearError(status, errors.status);
                return true;
            }

            function validateMaxOccupancy() {
                const val = maxOccupancy.value.trim();
                if (!val) {
                    showError(maxOccupancy, errors.maxOccupancy, "Số người ở tối đa là bắt buộc");
                    return false;
                }
                const num = parseInt(val);
                if (isNaN(num) || num < 1 || num > 20) {
                    showError(maxOccupancy, errors.maxOccupancy, "Số lượng người ở tối đa phải là số nguyên từ 1 đến 20");
                    return false;
                }
                clearError(maxOccupancy, errors.maxOccupancy);
                return true;
            }

            // Dynamic validations on user interaction
            apartmentNumber.addEventListener("input", validateApartmentNumber);
            floor.addEventListener("input", validateFloor);
            area.addEventListener("input", validateArea);
            roomType.addEventListener("change", validateRoomType);
            status.addEventListener("change", validateStatus);
            maxOccupancy.addEventListener("input", validateMaxOccupancy);

            form.addEventListener("submit", function(e) {
                const aptValid = validateApartmentNumber();
                const floorValid = validateFloor();
                const areaValid = validateArea();
                const roomTypeValid = validateRoomType();
                const statusValid = validateStatus();
                const maxOccValid = validateMaxOccupancy();

                if (!aptValid || !floorValid || !areaValid || !roomTypeValid || !statusValid || !maxOccValid) {
                    e.preventDefault();
                    const firstErr = document.querySelector(".is-invalid");
                    if (firstErr) {
                        firstErr.scrollIntoView({ behavior: "smooth", block: "center" });
                        firstErr.focus();
                    }
                }
            });
        });

        function previewImage(input, previewId, placeholderId, deleteBtnId, hiddenInputId) {
            const preview = document.getElementById(previewId);
            const placeholder = document.getElementById(placeholderId);
            const deleteBtn = document.getElementById(deleteBtnId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    preview.style.width = '100%';
                    preview.style.height = '100%';
                    preview.style.objectFit = 'cover';
                    placeholder.style.display = 'none';
                    deleteBtn.style.display = 'flex';
                    document.getElementById(hiddenInputId).value = "false";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage(inputId, previewId, placeholderId, deleteBtnId, hiddenInputId) {
            document.getElementById(inputId).value = "";
            const preview = document.getElementById(previewId);
            preview.src = "";
            preview.style.display = 'none';
            document.getElementById(placeholderId).style.display = 'block';
            document.getElementById(deleteBtnId).style.display = 'none';
            document.getElementById(hiddenInputId).value = "true";
        }
    </script>
</main>

</body>
</html>
