<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin/layout_admin :: admin-layout(~{::main}, 'users')}">

<head>
    <meta charset="UTF-8">
    <title th:text="${userDto.accountId == null ? 'Tạo người dùng' : 'Chỉnh sửa người dùng'}">Tạo người dùng</title>
</head>

<body>

    <main th:fragment="content">
        <!-- Load custom form CSS -->
        <link rel="stylesheet" th:href="@{/css/admin/form_user.css}">

        <!-- Page Header Actions -->
        <div class="detail-header-actions"
            style="display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; border-bottom: 1px solid var(--border-color); background-color: #F9FAFB; margin-bottom: 24px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;">
            <div class="detail-title" style="font-size: 20px; font-weight: 700; color: var(--text-primary);"
                th:text="${userDto.accountId == null ? 'Tạo tài khoản người dùng' : 'Chỉnh sửa hồ sơ & tài khoản người dùng'}">
                Tạo tài khoản người dùng
            </div>
            <a th:href="@{/admin/users}" class="btn-secondary">
                <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i>Quay lại danh sách
            </a>
        </div>

        <!-- Main Container -->
        <div class="tabs-container">
            <!-- Tabs Header (Hidden in Edit Mode) -->
            <div class="tabs-header" th:if="${userDto.accountId == null}">
                <button class="tab-btn active" data-tab="resident-tab">
                    <i class="fa-solid fa-house-user" style="margin-right: 8px;"></i>Cư dân
                </button>
                <button class="tab-btn" data-tab="manager-tab">
                    <i class="fa-solid fa-user-tie" style="margin-right: 8px;"></i>Quản lý
                </button>
                <button class="tab-btn" data-tab="staff-tab">
                    <i class="fa-solid fa-screwdriver-wrench" style="margin-right: 8px;"></i>Nhân viên Bảo trì
                </button>
            </div>

            <!-- Tabs Content Panels -->
            <div class="tabs-content">

                <!-- RESIDENT FORM -->
                <div id="resident-tab" class="tab-panel active">
                    <form
                        th:action="${userDto.accountId == null ? '/admin/users/create' : '/admin/users/edit/' + userDto.accountId}"
                        method="post" th:object="${userDto}">
                        <input type="hidden" name="roleName" value="RESIDENT">
                        <input type="hidden" th:field="*{profileId}">
                        <input type="hidden" th:field="*{employeeProfileId}">
                        <input type="hidden" th:field="*{accountId}">

                        <div class="form-title"
                            th:text="${userDto.accountId == null ? 'Thông tin hồ sơ & tài khoản cư dân' : 'Chỉnh sửa hồ sơ & tài khoản cư dân'}">
                            Thông tin hồ sơ & tài khoản cư dân
                        </div>

                        <!-- Form Fields Grid -->
                        <div class="form-grid">


                            <div class="form-group">
                                <label for="res-fullname">Họ và tên<span class="required-star">*</span></label>
                                <input type="text" id="res-fullname" th:field="*{fullName}" class="form-control"
                                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Nguyễn Văn A">
                                <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                                    th:errors="*{fullName}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-gender">Giới tính<span class="required-star">*</span></label>
                                <select id="res-gender" th:field="*{gender}" class="form-control"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                                    <option value="">Chọn giới tính</option>
                                    <option value="1">Nam</option>
                                    <option value="0">Nữ</option>
                                    <option value="2">Khác</option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('gender')}"
                                    th:errors="*{gender}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-dob">Ngày sinh</label>
                                <input type="date" id="res-dob" th:field="*{dateOfBirth}" class="form-control"
                                    th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('dateOfBirth')}"
                                    th:errors="*{dateOfBirth}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-phone">Số điện thoại<span class="required-star">*</span></label>
                                <input type="text" id="res-phone" th:field="*{phoneNumber}" class="form-control"
                                    th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 0912345678">
                                <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                                    th:errors="*{phoneNumber}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-email">Email<span class="required-star">*</span></label>
                                <input type="text" id="res-email" th:field="*{email}" class="form-control"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                    placeholder="Ví dụ: nguyenvana@example.com">
                                <span class="error-text" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></span>
                            </div>

                            <!-- Password field visible on create, hidden on edit -->
                            <div class="form-group" th:if="${userDto.accountId == null}">
                                <label for="res-password">Mật khẩu<span class="required-star">*</span></label>
                                <input type="password" id="res-password" th:field="*{password}" class="form-control"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                    placeholder="••••••••">
                                <span class="error-text" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></span>
                            </div>
                            <input type="hidden" th:field="*{password}" th:if="${userDto.accountId != null}">

                            <div class="form-group">
                                <label for="res-placebirth">Nơi sinh</label>
                                <input type="text" id="res-placebirth" th:field="*{placeOfBirth}" class="form-control"
                                    th:classappend="${#fields.hasErrors('placeOfBirth')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Hà Nội">
                                <span class="error-text" th:if="${#fields.hasErrors('placeOfBirth')}"
                                    th:errors="*{placeOfBirth}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-citizen">Số CCCD<span class="required-star">*</span></label>
                                <input type="text" id="res-citizen" th:field="*{citizenId}" class="form-control"
                                    th:classappend="${#fields.hasErrors('citizenId')} ? 'is-invalid'"
                                    placeholder="Số định danh 12 chữ số">
                                <span class="error-text" th:if="${#fields.hasErrors('citizenId')}"
                                    th:errors="*{citizenId}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-citizen-date">Ngày cấp</label>
                                <input type="date" id="res-citizen-date" th:field="*{citizenIdIssueDate}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('citizenIdIssueDate')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('citizenIdIssueDate')}"
                                    th:errors="*{citizenIdIssueDate}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-citizen-place">Nơi cấp</label>
                                <input type="text" id="res-citizen-place" th:field="*{citizenIdIssuePlace}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('citizenIdIssuePlace')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Cục QLHC về TTXH">
                                <span class="error-text" th:if="${#fields.hasErrors('citizenIdIssuePlace')}"
                                    th:errors="*{citizenIdIssuePlace}"></span>
                            </div>
                            <div class="form-group">
                                <label for="res-nationality">Quốc tịch</label>
                                <input type="text" id="res-nationality" th:field="*{nationality}" class="form-control"
                                    th:classappend="${#fields.hasErrors('nationality')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('nationality')}"
                                    th:errors="*{nationality}"></span>
                            </div>
                            <div class="form-group">
                                <label for="res-ethnicity">Dân tộc</label>
                                <input type="text" id="res-ethnicity" th:field="*{ethnicity}" class="form-control"
                                    th:classappend="${#fields.hasErrors('ethnicity')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('ethnicity')}"
                                    th:errors="*{ethnicity}"></span>
                            </div>
                            <div class="form-group">
                                <label for="res-status">Trạng thái cư dân<span class="required-star">*</span></label>
                                <select id="res-status" th:field="*{residentStatus}" class="form-control" required>
                                    <option value="1">Thường trú / Đang ở</option>
                                    <option value="3">Tạm trú</option>
                                    <option value="2">Đã dọn đi</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="res-movein">Ngày dọn vào</label>
                                <input type="date" id="res-movein" th:field="*{moveInDate}" class="form-control"
                                    th:classappend="${#fields.hasErrors('moveInDate')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('moveInDate')}"
                                    th:errors="*{moveInDate}"></span>
                            </div>
                            <div class="form-group">
                                <label for="res-moveout">Ngày dọn đi</label>
                                <input type="date" id="res-moveout" th:field="*{moveOutDate}" class="form-control"
                                    th:classappend="${#fields.hasErrors('moveOutDate')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('moveOutDate')}"
                                    th:errors="*{moveOutDate}"></span>
                            </div>

                            <div class="form-group">
                                <label for="res-emergency-name">Tên liên hệ khẩn cấp</label>
                                <input type="text" id="res-emergency-name" th:field="*{emergencyContactName}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('emergencyContactName')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Tên người thân">
                                <span class="error-text" th:if="${#fields.hasErrors('emergencyContactName')}"
                                    th:errors="*{emergencyContactName}"></span>
                            </div>
                            <div class="form-group">
                                <label for="res-emergency-phone">SĐT liên hệ khẩn cấp</label>
                                <input type="text" id="res-emergency-phone" th:field="*{emergencyContactPhone}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('emergencyContactPhone')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Số điện thoại">
                                <span class="error-text" th:if="${#fields.hasErrors('emergencyContactPhone')}"
                                    th:errors="*{emergencyContactPhone}"></span>
                            </div>

                            <div class="form-group full-width">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="res-owner" th:field="*{isHouseholdOwner}"
                                        class="checkbox-control" value="true">
                                    <label for="res-owner">Là chủ hộ ?</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="res-relation-to-owner">Quan hệ với chủ hộ</label>
                                <input type="text" id="res-relation-to-owner" th:field="*{relationshipToOwner}"
                                    class="form-control"
                                    th:classappend="${#fields.hasErrors('relationshipToOwner')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Bố mẹ, Vợ/Chồng, Con...">
                                <span class="error-text" th:if="${#fields.hasErrors('relationshipToOwner')}"
                                    th:errors="*{relationshipToOwner}"></span>
                            </div>
                        </div>

                        <div class="form-actions">
                            <a th:href="@{/admin/users}" class="btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn-primary"
                                th:text="${userDto.accountId == null ? 'Lưu cư dân' : 'Cập nhật cư dân'}">Lưu cư
                                dân</button>
                        </div>
                    </form>
                </div>

                <!-- MANAGER FORM -->
                <div id="manager-tab" class="tab-panel">
                    <form
                        th:action="${userDto.accountId == null ? '/admin/users/create' : '/admin/users/edit/' + userDto.accountId}"
                        method="post" th:object="${userDto}">
                        <input type="hidden" name="roleName" value="MANAGER">
                        <input type="hidden" th:field="*{profileId}">
                        <input type="hidden" th:field="*{employeeProfileId}">
                        <input type="hidden" th:field="*{accountId}">

                        <div class="form-title"
                            th:text="${userDto.accountId == null ? 'Thông tin hồ sơ & tài khoản quản lý' : 'Chỉnh sửa hồ sơ & tài khoản quản lý'}">
                            Thông tin hồ sơ & tài khoản quản lý
                        </div>

                        <div class="form-grid">


                            <div class="form-group">
                                <label for="man-fullname">Họ và tên<span class="required-star">*</span></label>
                                <input type="text" id="man-fullname" th:field="*{fullName}" class="form-control"
                                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Nguyễn Văn B">
                                <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                                    th:errors="*{fullName}"></span>
                            </div>

                            <div class="form-group">
                                <label for="man-gender">Giới tính<span class="required-star">*</span></label>
                                <select id="man-gender" th:field="*{gender}" class="form-control"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                                    <option value="">Chọn giới tính</option>
                                    <option value="1">Nam</option>
                                    <option value="0">Nữ</option>
                                    <option value="2">Khác</option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('gender')}"
                                    th:errors="*{gender}"></span>
                            </div>

                            <div class="form-group">
                                <label for="man-dob">Ngày sinh</label>
                                <input type="date" id="man-dob" th:field="*{dateOfBirth}" class="form-control"
                                    th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('dateOfBirth')}"
                                    th:errors="*{dateOfBirth}"></span>
                            </div>

                            <div class="form-group">
                                <label for="man-phone">Số điện thoại<span class="required-star">*</span></label>
                                <input type="text" id="man-phone" th:field="*{phoneNumber}" class="form-control"
                                    th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 0912345678">
                                <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                                    th:errors="*{phoneNumber}"></span>
                            </div>

                            <div class="form-group">
                                <label for="man-email">Email<span class="required-star">*</span></label>
                                <input type="text" id="man-email" th:field="*{email}" class="form-control"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                    placeholder="Ví dụ: manager@example.com">
                                <span class="error-text" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></span>
                            </div>

                            <div class="form-group full-width">
                                <label for="man-address">Địa chỉ</label>
                                <input type="text" id="man-address" th:field="*{address}" class="form-control"
                                    th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 123 Đường ABC, Quận XYZ">
                                <span class="error-text" th:if="${#fields.hasErrors('address')}"
                                    th:errors="*{address}"></span>
                            </div>

                            <!-- Password field visible on create, hidden on edit -->
                            <div class="form-group" th:if="${userDto.accountId == null}">
                                <label for="man-password">Mật khẩu<span class="required-star">*</span></label>
                                <input type="password" id="man-password" th:field="*{password}" class="form-control"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                    placeholder="••••••••">
                                <span class="error-text" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></span>
                            </div>
                            <input type="hidden" th:field="*{password}" th:if="${userDto.accountId != null}">

                        </div>

                        <div class="form-actions">
                            <a th:href="@{/admin/users}" class="btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn-primary"
                                th:text="${userDto.accountId == null ? 'Lưu quản lý' : 'Cập nhật quản lý'}">Lưu quản
                                lý</button>
                        </div>
                    </form>
                </div>

                <!-- MAINTENANCE STAFF FORM -->
                <div id="staff-tab" class="tab-panel">
                    <form
                        th:action="${userDto.accountId == null ? '/admin/users/create' : '/admin/users/edit/' + userDto.accountId}"
                        method="post" th:object="${userDto}">
                        <input type="hidden" name="roleName" value="MAINTENANCE_STAFF">
                        <input type="hidden" th:field="*{profileId}">
                        <input type="hidden" th:field="*{employeeProfileId}">
                        <input type="hidden" th:field="*{accountId}">

                        <div class="form-title"
                            th:text="${userDto.accountId == null ? 'Thông tin hồ sơ & tài khoản nhân viên bảo trì' : 'Chỉnh sửa hồ sơ & tài khoản nhân viên bảo trì'}">
                            Thông tin hồ sơ & tài khoản nhân viên bảo trì
                        </div>

                        <div class="form-grid">


                            <div class="form-group">
                                <label for="st-fullname">Họ và tên<span class="required-star">*</span></label>
                                <input type="text" id="st-fullname" th:field="*{fullName}" class="form-control"
                                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Nguyễn Văn C">
                                <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                                    th:errors="*{fullName}"></span>
                            </div>

                            <div class="form-group">
                                <label for="st-gender">Giới tính<span class="required-star">*</span></label>
                                <select id="st-gender" th:field="*{gender}" class="form-control"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                                    <option value="">Chọn giới tính</option>
                                    <option value="1">Nam</option>
                                    <option value="0">Nữ</option>
                                    <option value="2">Khác</option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('gender')}"
                                    th:errors="*{gender}"></span>
                            </div>

                            <div class="form-group">
                                <label for="st-dob">Ngày sinh</label>
                                <input type="date" id="st-dob" th:field="*{dateOfBirth}" class="form-control"
                                    th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('dateOfBirth')}"
                                    th:errors="*{dateOfBirth}"></span>
                            </div>

                            <div class="form-group">
                                <label for="st-phone">Số điện thoại<span class="required-star">*</span></label>
                                <input type="text" id="st-phone" th:field="*{phoneNumber}" class="form-control"
                                    th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 0912345678">
                                <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                                    th:errors="*{phoneNumber}"></span>
                            </div>

                            <div class="form-group">
                                <label for="st-email">Email<span class="required-star">*</span></label>
                                <input type="text" id="st-email" th:field="*{email}" class="form-control"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                    placeholder="Ví dụ: staff@example.com">
                                <span class="error-text" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></span>
                            </div>

                            <div class="form-group full-width">
                                <label for="st-address">Địa chỉ</label>
                                <input type="text" id="st-address" th:field="*{address}" class="form-control"
                                    th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 456 Đường DEF, Quận UVW">
                                <span class="error-text" th:if="${#fields.hasErrors('address')}"
                                    th:errors="*{address}"></span>
                            </div>

                            <!-- Password field visible on create, hidden on edit -->
                            <div class="form-group" th:if="${userDto.accountId == null}">
                                <label for="st-password">Mật khẩu<span class="required-star">*</span></label>
                                <input type="password" id="st-password" th:field="*{password}" class="form-control"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                    placeholder="••••••••">
                                <span class="error-text" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></span>
                            </div>
                            <input type="hidden" th:field="*{password}" th:if="${userDto.accountId != null}">

                        </div>

                        <div class="form-actions">
                            <a th:href="@{/admin/users}" class="btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn-primary"
                                th:text="${userDto.accountId == null ? 'Lưu nhân viên' : 'Cập nhật nhân viên'}">Lưu nhân
                                viên</button>
                        </div>
                    </form>
                </div>

                <!-- ADMIN FORM -->
                <div id="admin-tab" class="tab-panel">
                    <form
                        th:action="${userDto.accountId == null ? '/admin/users/create' : '/admin/users/edit/' + userDto.accountId}"
                        method="post" th:object="${userDto}">
                        <input type="hidden" name="roleName" value="ADMIN">
                        <input type="hidden" th:field="*{profileId}">
                        <input type="hidden" th:field="*{employeeProfileId}">
                        <input type="hidden" th:field="*{accountId}">

                        <div class="form-title"
                            th:text="${userDto.accountId == null ? 'Thông tin hồ sơ & tài khoản admin' : 'Chỉnh sửa hồ sơ & tài khoản admin'}">
                            Thông tin hồ sơ & tài khoản admin
                        </div>

                        <div class="form-grid">

                            <div class="form-group">
                                <label for="ad-fullname">Họ và tên<span class="required-star">*</span></label>
                                <input type="text" id="ad-fullname" th:field="*{fullName}" class="form-control"
                                    th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                    placeholder="Ví dụ: Nguyễn Văn A">
                                <span class="error-text" th:if="${#fields.hasErrors('fullName')}"
                                    th:errors="*{fullName}"></span>
                            </div>

                            <div class="form-group">
                                <label for="ad-gender">Giới tính<span class="required-star">*</span></label>
                                <select id="ad-gender" th:field="*{gender}" class="form-control"
                                    th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                                    <option value="">Chọn giới tính</option>
                                    <option value="1">Nam</option>
                                    <option value="0">Nữ</option>
                                    <option value="2">Khác</option>
                                </select>
                                <span class="error-text" th:if="${#fields.hasErrors('gender')}"
                                    th:errors="*{gender}"></span>
                            </div>

                            <div class="form-group">
                                <label for="ad-dob">Ngày sinh</label>
                                <input type="date" id="ad-dob" th:field="*{dateOfBirth}" class="form-control"
                                    th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'is-invalid'">
                                <span class="error-text" th:if="${#fields.hasErrors('dateOfBirth')}"
                                    th:errors="*{dateOfBirth}"></span>
                            </div>

                            <div class="form-group">
                                <label for="ad-phone">Số điện thoại<span class="required-star">*</span></label>
                                <input type="text" id="ad-phone" th:field="*{phoneNumber}" class="form-control"
                                    th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 0912345678">
                                <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}"
                                    th:errors="*{phoneNumber}"></span>
                            </div>

                            <div class="form-group">
                                <label for="ad-email">Email<span class="required-star">*</span></label>
                                <input type="text" id="ad-email" th:field="*{email}" class="form-control"
                                    th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                    placeholder="Ví dụ: admin@example.com">
                                <span class="error-text" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></span>
                            </div>

                            <div class="form-group full-width">
                                <label for="ad-address">Địa chỉ</label>
                                <input type="text" id="ad-address" th:field="*{address}" class="form-control"
                                    th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'"
                                    placeholder="Ví dụ: 789 Đường GHI, Quận JKL">
                                <span class="error-text" th:if="${#fields.hasErrors('address')}"
                                    th:errors="*{address}"></span>
                            </div>

                            <!-- Password field visible on create, hidden on edit -->
                            <div class="form-group" th:if="${userDto.accountId == null}">
                                <label for="ad-password">Mật khẩu<span class="required-star">*</span></label>
                                <input type="password" id="ad-password" th:field="*{password}" class="form-control"
                                    th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                    placeholder="••••••••">
                                <span class="error-text" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></span>
                            </div>
                            <input type="hidden" th:field="*{password}" th:if="${userDto.accountId != null}">

                        </div>

                        <div class="form-actions">
                            <a th:href="@{/admin/users}" class="btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn-primary"
                                th:text="${userDto.accountId == null ? 'Lưu admin' : 'Cập nhật admin'}">Lưu
                                admin</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>

        <!-- submittedRole data bridge for external form_user.js script -->
        <input type="hidden" id="submittedRole" th:value="${userDto.roleName}">

        <!-- Client-side Tab Switcher Script -->
        <script th:src="@{/js/admin/form_user.js}"></script>
    </main>

</body>

</html>
