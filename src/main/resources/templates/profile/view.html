<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ho so ca nhan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
        .container{max-width:800px;margin:40px auto;padding:0 20px}
        .card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:24px;overflow:hidden}
        .card-header{padding:20px 24px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px}
        .card-header h2{font-size:18px;font-weight:600}
        .card-body{padding:24px}
        .avatar-section{display:flex;align-items:center;gap:20px;margin-bottom:24px}
        .avatar-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700}
        .avatar-info h3{font-size:20px;margin-bottom:4px}
        .avatar-info p{color:#6b7280;font-size:14px}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group.full{grid-column:1/-1}
        .form-group label{font-size:13px;font-weight:600;color:#6b7280}
        .form-group input,.form-group select{padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.12)}
        .form-group input:read-only{background:#f9fafb;color:#6b7280;cursor:not-allowed}
        .btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
        .btn-primary:hover{opacity:.9}
        .btn-back{text-decoration:none;color:#6b7280;font-size:14px}
        .alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px}
        .alert-success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
        .alert-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
        .action-bar{display:flex;justify-content:flex-end;gap:12px;margin-top:20px}
        .tab-bar{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:24px}
        .tab{padding:12px 24px;cursor:pointer;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;color:#6b7280}
        .tab.active{color:#667eea;border-bottom-color:#667eea}
        .tab-content{display:none}
        .tab-content.active{display:block}
        @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="container">
    <div style="margin-bottom:16px">
        <a th:href="@{/}" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Quay lai</a>
    </div>
    <div th:if="${message}" th:classappend="${messageType == 'success' ? 'alert-success' : 'alert-error'}" class="alert" th:text="${message}"></div>
    <div class="card">
        <div class="card-header"><i class="fa-solid fa-user-circle" style="font-size:24px;color:#667eea"></i><h2>Ho so ca nhan</h2></div>
        <div class="card-body">
            <div class="avatar-section">
                <div class="avatar-circle" th:text="${#strings.substring(#strings.defaultString(profileType == 'resident' ? profile.fullName : employeeProfile.fullName, '?'), 0, 1)}">A</div>
                <div class="avatar-info">
                    <h3 th:text="${profileType == 'resident' ? profile.fullName : employeeProfile.fullName}">Ten</h3>
                    <p th:text="${username}">email</p>
                </div>
            </div>
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('info')"><i class="fa-solid fa-info-circle"></i> Thong tin</div>
                <div class="tab" onclick="switchTab('password')"><i class="fa-solid fa-lock"></i> Doi mat khau</div>
            </div>
            <div id="tab-info" class="tab-content active">
                <form method="post" th:action="@{/profile/update}">
                    <div class="form-grid">
                        <div class="form-group full"><label>Email dang nhap</label><input type="email" th:value="${username}" readonly></div>
                        <div class="form-group full"><label>Ho va ten</label><input type="text" name="fullName" required th:value="${profileType == 'resident' ? profile.fullName : employeeProfile.fullName}"></div>
                        <div class="form-group"><label>So dien thoai</label><input type="text" name="phoneNumber" required th:value="${profileType == 'resident' ? profile.phoneNumber : employeeProfile.phoneNumber}"></div>
                        <div class="form-group">
                            <label>Gioi tinh</label>
                            <select name="gender" th:if="${profileType == 'resident'}">
                                <option value="Nam" th:selected="${profile.gender == 'Nam'}">Nam</option>
                                <option value="Nu" th:selected="${profile.gender == 'Nu'}">Nu</option>
                                <option value="Khac" th:selected="${profile.gender == 'Khac'}">Khac</option>
                            </select>
                            <select name="gender" th:if="${profileType != 'resident'}">
                                <option value="1" th:selected="${employeeProfile.gender == true}">Nam</option>
                                <option value="0" th:selected="${employeeProfile.gender == false}">Nu</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Ngay sinh</label><input type="date" name="dateOfBirth" th:value="${#temporals.format(profileType == 'resident' ? profile.dateOfBirth : employeeProfile.dateOfBirth, 'yyyy-MM-dd')}"></div>
                        <div class="form-group full" th:if="${profileType != 'resident'}"><label>Dia chi</label><input type="text" name="address" th:value="${employeeProfile.address}"></div>
                        <div class="form-group full" th:if="${profileType == 'resident'}"><label>Dia chi</label><input type="text" name="address" th:value="${profile.placeOfBirth}"></div>
                    </div>
                    <div class="action-bar"><button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Luu thay doi</button></div>
                </form>
            </div>
            <div id="tab-password" class="tab-content">
                <form method="post" th:action="@{/profile/change-password}">
                    <div class="form-grid">
                        <div class="form-group full"><label>Mat khau hien tai</label><input type="password" name="currentPassword" required placeholder="******"></div>
                        <div class="form-group full"><label>Mat khau moi</label><input type="password" name="newPassword" required minlength="6" placeholder="******"></div>
                        <div class="form-group full"><label>Xac nhan mat khau moi</label><input type="password" name="confirmPassword" required minlength="6" placeholder="******"></div>
                    </div>
                    <div class="action-bar"><button type="submit" class="btn btn-primary"><i class="fa-solid fa-key"></i> Doi mat khau</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
function switchTab(tab){
    document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
    document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
    document.getElementById('tab-'+tab).classList.add('active');
    event.target.classList.add('active');
}
</script>
</body>
</html>
