<div th:replace="~{layout/resident/layout_resident :: resident-layout(~{::content}, 'maintenance-requests')}">
    <div th:fragment="content">
        <link rel="stylesheet" th:href="@{/css/manager/maintenance/maintenance.css}">

        <div class="back-link-row">
            <a th:href="@{/resident/maintenance}" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Requests</span>
            </a>
        </div>

        <div class="request-details-card">
            <div class="card-header">
                <div>
                    <h3 th:text="${request.title}">Water leak</h3>
                    <span style="font-size:13px;color:#718096;margin-top:4px;display:block;" th:text="'Request #' + ${request.requestId}">Request #1</span>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                <a th:if="${request.status == 0}" th:href="@{/resident/maintenance/{id}/edit(id=${request.requestId})}" style="background:#4c51bf;color:#fff;padding:6px 14px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;">
                        <i class="fa-solid fa-pen"></i> Edit
                    </a>
<span class="status-badge"
                      th:classappend="${request.status == 0 ? ' pending' : request.status == 1 ? ' assigned' : request.status == 2 ? ' completed' : ' pending'}"
                      th:text="${request.status == 0 ? 'Pending' : request.status == 1 ? 'In Progress' : request.status == 2 ? 'Completed' : request.status == 3 ? 'Rejected' : 'Unknown'}">Pending</span>
                </div>
            <div class="card-body">
                <div class="detail-row-grid">
                    <div class="detail-row">
                        <span class="detail-label">Apartment</span>
                        <span class="detail-value" th:text="${request.apartment?.apartmentNumber ?: '-'}">A-101</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Request Date</span>
                        <span class="detail-value" th:text="${#temporals.format(request.requestDate, 'yyyy-MM-dd HH:mm')}">2026-07-01</span>
                    </div>
                </div>
                <div class="detail-row full-width" style="margin-top:16px;">
                    <span class="detail-label">Description</span>
                    <div class="detail-description-box" th:text="${request.description}">Description here</div>
                </div>

                <!-- Task Progress Section -->
                <div class="detail-row full-width" style="margin-top:16px;" th:if="${hasTask}">
                    <span class="detail-label">Task Progress</span>
                    <div style="background:#f7fafc;border:1px solid #edf2f7;border-radius:8px;padding:16px;margin-top:8px;">
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                            <span style="font-size:13px;color:#4a5568;"><strong>Staff:</strong> <span th:text="${taskStaffName}">-</span></span>
                            <span style="font-size:13px;color:#4a5568;"><strong>Deadline:</strong> <span th:if="${taskDeadline != null}" th:text="${#temporals.format(taskDeadline, 'yyyy-MM-dd')}">-</span><span th:if="${taskDeadline == null}">-</span></span>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                            <div style="flex:1;height:8px;background:#edf2f7;border-radius:4px;">
                                <div th:style="'width:' + ${progressPercent} + '%;height:100%;border-radius:4px;background:' + ${progressPercent >= 80 ? '#38a169' : progressPercent >= 50 ? '#d69e2e' : '#e53e3e'}"></div>
                            </div>
                            <span style="font-size:14px;font-weight:700;color:#4a5568;" th:text="${progressPercent + '%'}">0%</span>
                        </div>
                        <div th:if="${latestReport != null and latestReport != ''}" style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:12px;">
                            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                                <span style="font-size:11px;font-weight:600;color:#718096;text-transform:uppercase;">Latest Report</span>
                                <span style="font-size:11px;color:#a0aec0;" th:if="${latestReportDate != null}" th:text="${#temporals.format(latestReportDate, 'yyyy-MM-dd HH:mm')}">-</span>
                            </div>
                            <p style="font-size:13px;color:#2d3748;margin:0;line-height:1.5;" th:text="${latestReport}">Report content here</p>
                        </div>
                    </div>
                </div>

                <div class="detail-row full-width" style="margin-top:16px;" th:if="${not #lists.isEmpty(images)}">
                    <span class="detail-label">Images</span>
                    <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;">
                        <div th:each="img : ${images}">
                            <img th:src="${img.imageUrl}" style="max-width:280px;max-height:280px;border-radius:8px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
