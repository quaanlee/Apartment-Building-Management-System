<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/resident/layout_resident :: resident-layout(~{::main}, 'billing')}">
<head>
    <title>Billing Directory</title>
</head>
<body>
<main th:fragment="content">
    <link rel="stylesheet" th:href="@{/css/resident/billing.css}">

    <div class="page-header">
        <h2 class="page-title">Billing Directory</h2>
        <p class="page-subtitle" th:text="${apartment != null ? 'Apartment: ' + apartment.apartmentNumber + ' | Floor: ' + apartment.floor + ' | Area: ' + apartment.area + ' m²' : 'Manage and pay your apartment service bills'}">Manage and pay your apartment service bills</p>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger" style="background-color: #FDE8E8; color: #9B1C1C; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${error}">An error occurred</span>
    </div>

    <!-- Summary Cards -->
    <div class="summary-grid" th:if="${apartment != null}">
        <div class="summary-card orange">
            <div class="summary-icon"><i class="fa-solid fa-clock"></i></div>
            <div class="summary-body">
                <span class="summary-label">Total Unpaid</span>
                <span class="summary-value" th:text="${#numbers.formatDecimal(totalUnpaid, 1, 'POINT', 0, 'COMMA') + ' VNĐ'}">0 VNĐ</span>
            </div>
        </div>
        <div class="summary-card green">
            <div class="summary-icon"><i class="fa-solid fa-circle-check"></i></div>
            <div class="summary-body">
                <span class="summary-label">Total Paid</span>
                <span class="summary-value" th:text="${#numbers.formatDecimal(totalPaid, 1, 'POINT', 0, 'COMMA') + ' VNĐ'}">0 VNĐ</span>
            </div>
        </div>
        <div class="summary-card blue">
            <div class="summary-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="summary-body">
                <span class="summary-label">Total Overdue</span>
                <span class="summary-value" th:text="${#numbers.formatDecimal(totalOverdue, 1, 'POINT', 0, 'COMMA') + ' VNĐ'}">0 VNĐ</span>
            </div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" th:if="${apartment != null}">
        <a th:href="@{/resident/billing}" th:classappend="${activeStatus == null ? 'active' : ''}">All</a>
        <a th:href="@{/resident/billing(status=0)}" th:classappend="${activeStatus == 0 ? 'active' : ''}">Unpaid</a>
        <a th:href="@{/resident/billing(status=1)}" th:classappend="${activeStatus == 1 ? 'active' : ''}">Paid</a>
        <a th:href="@{/resident/billing(status=2)}" th:classappend="${activeStatus == 2 ? 'active' : ''}">Overdue</a>
    </div>

    <!-- Bills Table -->
    <div class="table-card" th:if="${apartment != null}">
        <table class="billing-table">
            <thead>
                <tr>
                    <th>Billing Period</th>
                    <th>Total Amount</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th class="right">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(bills)}">
                    <td colspan="5" class="no-data">
                        <i class="fa-solid fa-file-invoice"></i>
                        <span>No bills found.</span>
                    </td>
                </tr>
                <tr th:each="b : ${bills}">
                    <td th:text="${'Month ' + b.billMonth + '/' + b.billYear}">Month 06/2026</td>
                    <td class="amount" th:text="${#numbers.formatDecimal(b.totalAmount, 1, 'POINT', 0, 'COMMA') + ' VNĐ'}">0 VNĐ</td>
                    <td th:text="${b.dueDate != null ? #temporals.format(b.dueDate, 'dd/MM/yyyy') : 'N/A'}">N/A</td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${b.status == 1 ? 'paid' : (b.status == 2 ? 'overdue' : 'unpaid')}"
                              th:text="${b.status == 1 ? 'Paid' : (b.status == 2 ? 'Overdue' : 'Unpaid')}">Unpaid</span>
                    </td>
                    <td class="right">
                        <div class="billing-actions">
                            <a th:href="@{/resident/billing/detail/{id}(id=${b.billId})}" class="btn btn-secondary btn-sm" title="View details">
                                <i class="fa-solid fa-eye"></i> Detail
                            </a>
                            <a th:if="${b.status == 0 || b.status == 2}" th:href="@{/payment/bill/{id}(id=${b.billId})}" class="btn btn-success btn-sm" title="Pay with PayOS">
                                <i class="fa-solid fa-credit-card"></i> Pay Now
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>
</body>
</html>
