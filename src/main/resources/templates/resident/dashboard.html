<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/resident/layout_resident :: resident-layout(~{::#main-content}, 'dashboard')}"
      th:with="pageTitle='Resident Dashboard'">
<head>
    <title>Resident Dashboard</title>
</head>
<body>
<div id="main-content">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <div class="row">
        <div class="col-md-12">
            <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px; background: white;">
                <h1 style="font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 8px;">Resident Dashboard</h1>
                <p style="color: #64748b; margin-bottom: 24px;">Welcome back, <strong th:text="${session.currentUser != null && session.currentUser.profile != null ? session.currentUser.profile.fullName : 'Resident'}">Resident</strong>!</p>
                <div class="alert alert-info border-0" style="background-color: #F0EDFE; color: #582BE8; border-radius: 8px;">
                    <i class="fa-solid fa-circle-info me-2"></i> Welcome to the ABMS Resident Portal. Here you can view your apartment details, manage service bookings, register vehicles, and view important notifications from the building management office.
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
