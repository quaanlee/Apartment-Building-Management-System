<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/resident/layout_resident :: resident-layout(~{::#main-content}, 'dashboard')}"
      th:with="pageTitle='Resident Dashboard'">
<head>
    <title>Resident Dashboard</title>
</head>
<body>
<div id="main-content">
    <style>
        .dashboard-welcome-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #E5E7EB;
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
        }
        .dashboard-welcome-card h1 {
            color: #1E1B4B;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .dashboard-welcome-card p {
            color: #6B7280;
            font-size: 16px;
            margin-bottom: 24px;
        }
        .btn-action-dash {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background-color: #582BE8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-action-dash:hover {
            background-color: #4a22c9;
        }
    </style>
    
    <div class="dashboard-welcome-card">
        <h1>Welcome Back!</h1>
        <p>Hello, <strong th:text="${session.currentUser != null ? session.currentUser.username : 'Resident'}">Resident</strong>. Welcome to your ABMS Resident Portal.</p>
        <a th:href="@{/resident/billing}" class="btn-action-dash">View My Bills</a>
    </div>
</div>
</body>
</html>
