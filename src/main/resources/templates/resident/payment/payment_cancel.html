<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/resident/layout_resident :: resident-layout(~{::main}, 'payment')}">
<head><title>Payment Cancelled</title></head>
<body>
<main th:fragment="content">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px;text-align:center;">
        <div style="font-size:64px;">❌</div>
        <h2 style="color:#9B1C1C;font-size:28px;font-weight:700;">Payment Cancelled</h2>
        <p style="color:#6B7280;font-size:16px;">You cancelled the payment. Your bill remains unpaid.</p>
        <a th:href="@{/resident/billing}" style="background:#582BE8;color:white;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;">
            Back to Billing
        </a>
    </div>
</main>
</body>
</html>
