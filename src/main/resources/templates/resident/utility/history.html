<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/resident/layout_resident :: resident-layout(~{::#main-content}, 'booking')}"
      th:with="pageTitle='Lịch Sử Đặt Chỗ'">
<head>
    <title>Lịch Sử Đặt Chỗ</title>
</head>
<body>
<div id="main-content" class="container py-4">
    <link rel="stylesheet" th:href="@{/css/resident/utility-resident.css}">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/resident/utilities}" style="color: var(--primary-color); text-decoration: none;">Tiện Ích</a></li>
            <li class="breadcrumb-item active" aria-current="page">Lịch Sử Đặt Chỗ</li>
        </ol>
    </nav>
    <style>
        .text-primary { color: var(--primary-color) !important; }
        .bg-primary { background-color: var(--primary-color) !important; }
        .border-primary { border-color: var(--primary-color) !important; }
        .history-table { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .history-table thead th { background-color: var(--primary-color) !important; color: white !important; font-weight: 600; border: none; }
        .btn-outline-danger { border-color: #ef4444; color: #ef4444; }
        .btn-outline-danger:hover { background-color: #ef4444; color: white; }
    </style>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">Lịch Sử Đặt Chỗ</h2>
    </div>
    
    <div class="glass-panel p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 history-table">
                <thead>
                    <tr>
                        <th class="ps-4 py-3">Tiện Ích / Khu Vực</th>
                        <th>Thời Gian</th>
                        <th>Tổng Tiền</th>
                        <th>Trạng Thái</th>
                        <th>Thanh Toán</th>
                        <th>Ngày Tạo</th>
                        <th class="text-end pe-4">Hành Động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td class="ps-4 py-3">
                            <div class="fw-bold text-primary" th:text="${booking.utilityName}"></div>
                            <div class="text-muted small" th:text="${booking.resourceName}"></div>
                        </td>
                        <td>
                            <div>Từ: <strong th:text="${#temporals.format(booking.startTime, 'dd/MM/yyyy HH:mm')}"></strong></div>
                            <div>Đến: <strong th:text="${#temporals.format(booking.endTime, 'dd/MM/yyyy HH:mm')}"></strong></div>
                        </td>
                        <td><strong th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT') + ' VND'}"></strong></td>
                        <td>
                            <span class="badge rounded-pill" 
                                  th:classappend="${booking.status == 0 ? 'bg-warning text-dark' : (booking.status == 1 ? 'bg-success' : (booking.status == 2 ? 'bg-danger' : 'bg-secondary'))}"
                                  th:text="${booking.statusLabel}"></span>
                        </td>
                        <td>
                            <span th:if="${booking.paymentStatus}" class="text-success"><i class="fas fa-check-circle"></i> Đã Thanh Toán</span>
                            <span th:unless="${booking.paymentStatus}" class="text-warning"><i class="fas fa-clock"></i> Chưa Thanh Toán</span>
                        </td>
                        <td class="text-muted small" th:text="${#temporals.format(booking.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-end pe-4">
                            <button th:if="${booking.status == 0}" class="btn btn-sm btn-outline-danger rounded-pill" th:onclick="'showCancelModal(' + ${booking.bookingId} + ')'">Hủy Đặt</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="fas fa-calendar-times fs-2 mb-3"></i>
                            <h5>Bạn chưa có lịch sử đặt chỗ nào.</h5>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Cancel -->
<div class="modal fade" id="cancelModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header bg-danger text-white rounded-top-4">
        <h5 class="modal-title">Hủy Đặt Chỗ</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/resident/utilities/cancel/0}" method="post" id="cancelForm">
          <div class="modal-body p-4">
            <p>Bạn có chắc chắn muốn hủy đặt chỗ này không?</p>
            <div class="mb-3">
                <label class="form-label text-muted">Lý do hủy (tùy chọn)</label>
                <textarea name="reason" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Đóng</button>
            <button type="submit" class="btn btn-danger rounded-pill">Xác Nhận Hủy</button>
          </div>
      </form>
    </div>
  </div>
</div>

    <script>
        function showCancelModal(id) {
            var form = document.getElementById('cancelForm');
            form.action = '/resident/utilities/cancel/' + id;
            var modal = new bootstrap.Modal(document.getElementById('cancelModal'));
            modal.show();
        }
    </script>
</body>
</html>
