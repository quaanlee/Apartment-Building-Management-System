<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header(query, searchUrl)" class="header-bar">
    <div class="search-container">
        <form th:action="${searchUrl}" method="GET">
            <i class="fas fa-search search-icon"></i>
            <input type="text" name="query" th:value="${query}" class="search-input" placeholder="Search utilities, resources...">
        </form>
    </div>
</div>
</body>
</html>
