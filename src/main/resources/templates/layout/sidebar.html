<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-brand">
        <h1>ABMS Admin</h1>
        <span>Management Portal</span>
    </div>

    <ul class="sidebar-nav">
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? 'active'">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'user'} ? 'active'">
                <i class="fas fa-users"></i> User Management
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'building'} ? 'active'">
                <i class="fas fa-building"></i> Building Management
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'service'} ? 'active'">
                <i class="fas fa-concierge-bell"></i> Service Catalog
            </a>
        </li>
        <li>
            <a th:href="@{/admin/utilities}" class="sidebar-link" th:classappend="${activePage == 'utilities'} ? 'active'">
                <i class="fas fa-tools"></i> Utilities
            </a>
        </li>
        <li>
            <a href="#" class="sidebar-link" th:classappend="${activePage == 'logs'} ? 'active'">
                <i class="fas fa-history"></i> System Logs
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="#" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</aside>
</body>
</html>
