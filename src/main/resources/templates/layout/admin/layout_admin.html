<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="admin-layout(content, activeTab)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABMS Admin Panel</title>
    <!-- CSS File -->
    <link rel="stylesheet" th:href="@{/css/layout/layout_admin.css}">
    <link rel="stylesheet" th:href="@{/css/layout/components.css}">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>ABMS Admin</h1>
                <p>Cổng Quản Trị</p>
            </div>

            <ul class="sidebar-menu">
                <li class="sidebar-item" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}">
                    <a th:href="@{/admin/dashboard}">
                        <i class="fas fa-th-large"></i>
                        <span>Trang chủ</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'users' ? 'active' : ''}">
                    <a th:href="@{/admin/users}">
                        <i class="fa-solid fa-users-gear"></i>
                        <span>Quản lý người dùng</span>
                    </a>
                </li>

                <li class="sidebar-item" th:classappend="${activeTab == 'building' ? 'active' : ''}">
                    <a th:href="@{/admin/apartments}">
                        <i class="fa-solid fa-building"></i>
                        <span>Quản lý căn hộ</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'services' ? 'active' : ''}">
                    <a th:href="@{/admin/services}">
                        <i class="fa-solid fa-cubes"></i>
                        <span>Danh mục dịch vụ</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'utilities' ? 'active' : ''}">
                    <a th:href="@{/admin/utilities}">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Tiện ích</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'logs' ? 'active' : ''}">
                    <a th:href="@{/admin/logs}">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span>Nhật ký hệ thống</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <a th:href="@{/logout}" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Đăng xuất</span>
                </a>
            </div>
        </aside>

        <!-- Main Panel (Header + Main Content) -->
        <div class="main-panel">

            <!-- Header Section -->
            <header class="header">
                <!-- Removed Search Bar and Settings Icon per user request -->

                <!-- Action Controls -->
                <div class="header-actions">
                    <!-- Removed Settings Icon -->

                </div>
                <div style="margin-left:auto;"></div>
                <a th:href="@{/admin/profile}" class="user-profile-trigger" style="text-decoration:none;">
                    <div class="user-avatar-placeholder">A</div>
                    <span class="user-role">Quản trị viên</span>
                </a>
            </header>

            <!-- Main Page Content Insertion -->
            <main class="content-container">
                <div th:replace="${content}">
                    <!-- Page content will be injected here -->
                </div>
            </main>

        </div>

    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Toast message data bridge for external layout_admin.js script -->
    <div id="toastMessageData" th:if="${message != null}" th:data-message="${message}"
        th:data-type="${messageType != null ? messageType : 'success'}" style="display: none;"></div>

    <script th:src="@{/js/layout/layout_admin.js}"></script>
</body>

</html>
