<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="maintenance-layout(content, activeTab)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABMS Maintenance Portal</title>
    <!-- CSS File -->
    <link rel="stylesheet" th:href="@{/css/layout/layout_manager.css}">
    <link rel="stylesheet" th:href="@{/css/layout/components.css}">
    <link rel="stylesheet" th:href="@{/css/maintenance/tasks.css}">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <h1>ABMS Maintenance</h1>
                <p>Cổng Nhân Viên</p>
            </div>
            
            <ul class="sidebar-menu">
                <li class="sidebar-item" th:classappend="${activeTab == 'dashboard' ? 'active' : ''}">
                    <a th:href="@{/maintenance_staff/dashboard}">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Trang chủ</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'tasks' ? 'active' : ''}">
                    <a th:href="@{/maintenance_staff/tasks}">
                        <i class="fa-solid fa-screwdriver-wrench"></i>
                        <span>Nhiệm vụ được giao</span>
                    </a>
                </li>
                <li class="sidebar-item" th:classappend="${activeTab == 'history' ? 'active' : ''}">
                    <a th:href="@{/maintenance_staff/history}">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span>Lịch sử nhiệm vụ</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <a th:href="@{/logout}" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Đăng xuất</span>
                </a>
            </div>

        </aside>

        <!-- Main Panel -->
        <div class="main-panel">
            
            <!-- Header Section -->
            <header class="header">
                <!-- Page Title Area -->
                <div class="header-title-area">
                    <button class="sidebar-toggle-btn" id="sidebarToggle">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <span class="header-page-title" th:text="${pageTitle != null ? pageTitle : 'Cổng bảo trì'}">Cổng bảo trì</span>
                </div>
                
                <!-- Action Controls -->
                <div class="header-actions">
                    <a th:href="@{/maintenance_staff/notifications}" class="icon-btn" id="notificationBellBtn" title="Thông báo" style="position: relative; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #475569; border: none; cursor: pointer; transition: all 0.2s;">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge" id="notificationBadge" style="display: none;">0</span>
                    </a>
                    
                    <a th:href="@{/maintenance_staff/profile}" class="user-profile-trigger" id="userProfileTrigger" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                        <img th:if="${session.currentUser != null && session.currentUser.employeeProfile != null && session.currentUser.employeeProfile.avatarUrl != null}"
                             th:src="${session.currentUser.employeeProfile.avatarUrl}"
                             alt="Avatar"
                             style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #e2e8f0;">
                        <div th:unless="${session.currentUser != null && session.currentUser.employeeProfile != null && session.currentUser.employeeProfile.avatarUrl != null}"
                             class="user-avatar-placeholder"
                             th:text="${session.currentUser != null && session.currentUser.employeeProfile != null ? #strings.substring(session.currentUser.employeeProfile.fullName, 0, 1) : 'NV'}">NV</div>
                        <span class="user-role" th:text="${session.currentUser != null && session.currentUser.employeeProfile != null ? session.currentUser.employeeProfile.fullName : 'Nhân viên bảo trì'}">Nhân viên bảo trì</span>
                    </a>
                </div>
            </header>
            
            <!-- Main Page Content Insertion -->
            <main class="content-container">
                <div th:replace="${content}">
                    <!-- Page content will be injected here -->
                </div>
            </main>
            
        </div>
        
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- Toast message data bridge -->
    <div id="toastMessageData"
         th:if="${message != null}"
         th:data-message="${message}" 
         th:data-type="${messageType != null ? messageType : 'success'}" 
         style="display: none;"></div>

    <script th:src="@{/js/layout/layout_manager.js}"></script>
</body>
</html>
